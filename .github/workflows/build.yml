name: Build Plugin AAR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build AAR
        run: ./gradlew :plugin:assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: videoexport-release
          path: plugin/build/outputs/aar/plugin-release.aar
